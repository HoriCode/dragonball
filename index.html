<!DOCTYPE html>
<html>

<head>
  <title></title>
</head>
<style>
  body{
margin:0;
padding:20px;
font-family:Arial, sans-serif;
background:#b0b;
color:#e0d7d7;
}
h1{
text-align:center;
color:#f3f2ef;
}
.info{
text-align:center;
margin-bottom:20px;
}
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:#020617;
padding:15px;
border-radius:10px;
}
.card img{
width:100;
height:100px;
object-fit:cover;
border-radius:8px;
}
.card h2{
color:#38bdf8;
margin:10px 0 5px;
}
.card p{
font-size:14px;
margin:4px 0;
}
</style>
<body>
  <div class="info">
  <h1>Dragonball Characters</h1>
  <p>Name: Renz Danyel</p>
  <p>BSIT</p>
  </div>
  <div class="container" id="characterContainer"></div>
  
  <script>
  const URL = "https://dragonball-api.com/api/characters"
  const characterContainer = document.getElementById("characterContainer")
  
  fetch(URL)
  .then(res => res.json())
  .then(data => {
    data.items.forEach(char => {
      characterContainer.innerHTML += `
      <div class="card">
      <img src="${char.image}" alt="${char.name}">
      <h2>ID:${char.id}</h2>
      <p>Name:${char.name}</p>
      <p>Ki:${char.ki}</p>
      <p>Max Ki:${char.maxKi}</p>
      <p>Race:${char.race}</p>
      <p>Gender:${char.gender}</p>
      <p>${char.description}</p>
      </div>
      `;
    });
  })
  .catch(error => console.error("Error Fetching Information:",error));
</script>
</body>
</html>
